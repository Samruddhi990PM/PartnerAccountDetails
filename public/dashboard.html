<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Dashboard — Strategy Cues</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:#f5c800;--gold:#c49a00;--charcoal:#1a1a1a;
  --bg:#f2f0e8;--card:#fff;--border:#e0ddd4;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --red:#c0392b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.1);text-align:center;}
.login-brand{font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.login-box h2{font-family:"DM Serif Display",serif;font-size:1.6rem;font-weight:400;margin-bottom:6px;}
.login-box p{font-size:.83rem;color:var(--text2);margin-bottom:24px;}
.login-inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:.9rem;color:var(--text);background:var(--bg);outline:none;margin-bottom:12px;transition:border-color .2s;}
.login-inp:focus{border-color:var(--charcoal);background:#fff;}
.btn-login{width:100%;background:var(--yellow);color:#111;border:none;border-radius:10px;padding:12px;font-family:"DM Sans",sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .15s;}
.btn-login:hover{background:#ffd700;}
.login-err{color:var(--red);font-size:.8rem;margin-top:10px;display:none;}

/* Dashboard */
#dashboard{display:none;}
.topbar{background:var(--charcoal);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
.topbar-brand{font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.topbar-title{font-family:"DM Serif Display",serif;font-size:1.1rem;color:#f0ead8;font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.count{font-size:.78rem;color:#888;}
.btn-sm{border-radius:7px;padding:6px 14px;font-family:"DM Sans",sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;}
.btn-refresh{background:rgba(245,200,0,.12);border:1px solid rgba(245,200,0,.3);color:var(--yellow);}
.btn-refresh:hover{background:rgba(245,200,0,.22);}
.btn-logout{background:none;border:1px solid #444;color:#888;}
.btn-logout:hover{border-color:#888;color:#ccc;}

.main{padding:28px 32px;max-width:1100px;margin:0 auto;}

.toolbar{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.search-inp{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:"DM Sans",sans-serif;font-size:.85rem;color:var(--text);background:var(--card);outline:none;}
.search-inp:focus{border-color:var(--gold);}
.sort-sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:"DM Sans",sans-serif;font-size:.82rem;color:var(--text2);background:var(--card);outline:none;cursor:pointer;}

.cards{display:flex;flex-direction:column;gap:12px;}
.sub-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);}

.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;flex-wrap:wrap;user-select:none;}
.card-hdr-left{display:flex;align-items:center;gap:12px;}
.card-num{width:30px;height:30px;background:var(--charcoal);color:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;}
.card-email{font-weight:600;font-size:.92rem;}
.card-date{font-size:.74rem;color:var(--text3);margin-top:2px;}
.card-chev{color:var(--text3);font-size:1rem;transition:transform .22s;}
.card-chev.open{transform:rotate(180deg);}

.card-body{display:none;padding:22px;}
.card-body.open{display:block;}
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:620px){.cb-grid{grid-template-columns:1fr;}}

.fg{margin-bottom:16px;}
.fg-title{font-size:.68rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(196,154,0,.2);}

.kv{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f5f3ee;}
.kv:last-child{border-bottom:none;}
.kl{font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;min-width:150px;flex-shrink:0;}
.kv-v{font-size:.87rem;color:var(--text);}
.kv-e{font-size:.87rem;color:var(--text3);font-style:italic;}

.mt{width:100%;border-collapse:collapse;font-size:.83rem;}
.mt th{background:#f5f0e0;color:var(--text2);padding:6px 11px;text-align:left;font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
.mt td{padding:8px 11px;border-bottom:1px solid #f5f3ee;color:var(--text);vertical-align:middle;}
.mt tr:last-child td{border-bottom:none;}
.mt tr:nth-child(even) td{background:#fafaf7;}

.pwd-wrap{display:inline-flex;align-items:center;gap:6px;}
.pwd-dots{font-family:monospace;font-size:.85rem;letter-spacing:.05em;color:var(--text2);}
.pwd-text{font-family:monospace;font-size:.85rem;}
.pwd-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:.68rem;color:var(--text2);cursor:pointer;transition:all .12s;}
.pwd-btn:hover{background:var(--gold);color:#111;border-color:var(--gold);}
.pwd-btn.showing{background:var(--gold);color:#111;border-color:var(--gold);}

.otp-tag{display:inline-block;background:rgba(196,154,0,.12);color:var(--gold);border-radius:4px;padding:1px 7px;font-size:.72rem;font-weight:600;}
.remarks-box{background:#fafaf5;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.85rem;color:var(--text);line-height:1.6;}
.sec-notice{background:#fff8e1;border:1px solid #f0c040;border-radius:8px;padding:10px 16px;font-size:.78rem;color:#7a5c00;margin-bottom:20px;}
.state-box{text-align:center;padding:60px 20px;color:var(--text3);}
.state-box h3{font-size:1rem;margin-bottom:6px;color:var(--text2);}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- Login — single password only -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">Strategy Cues</div>
    <h2>Team Dashboard</h2>
    <p>Enter the dashboard password to view onboarding submissions.</p>
    <input class="login-inp" type="password" id="inp-pwd" placeholder="Dashboard password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Strategy Cues</div>
      <div class="topbar-title">Onboarding Submissions</div>
    </div>
    <div class="topbar-right">
      <span class="count" id="count"></span>
      <button class="btn-sm btn-refresh" onclick="loadData()">&#8635; Refresh</button>
      <button class="btn-sm btn-logout"  onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="sec-notice">
      &#128274; Full credentials shown here are sourced directly from submitted form data stored securely in Supabase. Only accessible with the dashboard password.
    </div>

    <div class="toolbar">
      <input class="search-inp" id="search" placeholder="Search by email, name, platform..." oninput="render()">
      <select class="sort-sel" id="sort" onchange="render()">
        <option value="desc">Newest first</option>
        <option value="asc">Oldest first</option>
      </select>
    </div>

    <div id="state" class="state-box" style="display:none"></div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
var pwd = '';
var allData = [];

function login() {
  var p   = document.getElementById('inp-pwd').value;
  var err = document.getElementById('login-err');
  if (!p) { err.textContent = 'Please enter the password.'; err.style.display = 'block'; return; }

  var btn = document.querySelector('.btn-login');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  err.style.display = 'none';

  fetch('/api/dashboard-data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: p })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    btn.textContent = 'Sign In';
    btn.disabled = false;
    if (res.success) {
      pwd = p;
      allData = res.data || [];
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('count').textContent = allData.length + ' submission' + (allData.length !== 1 ? 's' : '');
      render();
    } else {
      err.textContent = res.error || 'Incorrect password.';
      err.style.display = 'block';
    }
  })
  .catch(function(e) {
    btn.textContent = 'Sign In';
    btn.disabled = false;
    err.textContent = 'Could not connect. Try again.';
    err.style.display = 'block';
  });
}

function logout() {
  pwd = ''; allData = [];
  document.getElementById('inp-pwd').value = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function loadData() {
  if (!pwd) return;
  setState('<div class="spin"></div><br>Refreshing...');
  fetch('/api/dashboard-data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.success) {
      allData = res.data || [];
      document.getElementById('count').textContent = allData.length + ' submission' + (allData.length !== 1 ? 's' : '');
      setState('');
      render();
    }
  })
  .catch(function() { setState('<h3>Could not refresh</h3>'); });
}

function render() {
  var q    = document.getElementById('search').value.toLowerCase();
  var sort = document.getElementById('sort').value;
  var list = allData.slice().sort(function(a, b) {
    return sort === 'asc'
      ? new Date(a.submitted_at) - new Date(b.submitted_at)
      : new Date(b.submitted_at) - new Date(a.submitted_at);
  });
  if (q) {
    list = list.filter(function(s) {
      return JSON.stringify(s).toLowerCase().indexOf(q) !== -1;
    });
  }
  if (!list.length) {
    setState(q ? '<h3>No results for "' + esc(q) + '"</h3>' : '<h3>No submissions yet</h3>');
    document.getElementById('cards').innerHTML = '';
    return;
  }
  setState('');
  document.getElementById('cards').innerHTML = list.map(function(s, i) {
    return buildCard(s, i);
  }).join('');
}

function buildCard(s, i) {
  var date  = s.submitted_at ? new Date(s.submitted_at).toLocaleString() : '-';
  var ourWA = s.our_wa       || [];
  var emer  = s.emergency_wa || [];
  var plats = s.platforms    || [];

  var ourRows = ourWA.length
    ? ourWA.map(function(w) {
        return '<tr><td>' + esc(w.name||'-') + '</td><td>' + esc(w.number||'-') + '</td></tr>';
      }).join('')
    : '<tr><td colspan="2" style="color:var(--text3);font-style:italic">None</td></tr>';

  var emerRows = emer.length
    ? emer.map(function(w) {
        return '<tr><td>' + esc(w.emer_name||'-') + '</td><td>' + esc(w.emer_contact||'-') + '</td></tr>';
      }).join('')
    : '<tr><td colspan="2" style="color:var(--text3);font-style:italic">None</td></tr>';

  var platRows = plats.map(function(p, j) {
    var uid = 'p' + i + '_' + j;
    var pwd = esc(p.password || '');
    return '<tr>'
      + '<td><strong>' + esc(p.platform||'-') + '</strong></td>'
      + '<td>' + esc(p.username||'-') + '</td>'
      + '<td><div class="pwd-wrap">'
      + '<span id="' + uid + '" class="pwd-dots" data-p="' + pwd + '">&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;</span>'
      + '<button class="pwd-btn" onclick="tpwd(&quot;' + uid + '&quot;,this)">Show</button>'
      + '</div></td>'
      + '<td>' + (p.otp ? '<span class="otp-tag">' + esc(p.otp) + '</span>' : '-') + '</td>'
      + '</tr>';
  }).join('') || '<tr><td colspan="4" style="color:var(--text3);font-style:italic">None</td></tr>';

  return '<div class="sub-card">'
    + '<div class="card-hdr" onclick="tog(this)">'
    + '<div class="card-hdr-left">'
    + '<div class="card-num">' + (i+1) + '</div>'
    + '<div><div class="card-email">' + esc(s.official_email||'No email') + '</div>'
    + '<div class="card-date">' + esc(date) + '</div></div>'
    + '</div>'
    + '<span class="card-chev">&#9662;</span>'
    + '</div>'
    + '<div class="card-body">'
    + '<div class="cb-grid">'
    + '<div class="fg"><div class="fg-title">General Information</div>'
    + kvr('Official Email',      s.official_email)
    + kvr('Contact Name',        s.phone_name)
    + kvr('Verification Number', s.verification_num)
    + '</div>'
    + '<div class="fg"><div class="fg-title">Remarks</div>'
    + (s.remarks ? '<div class="remarks-box">' + esc(s.remarks) + '</div>' : '<span class="kv-e">No remarks</span>')
    + '</div>'
    + '</div>'
    + '<div class="fg"><div class="fg-title">Our WhatsApp Numbers</div>'
    + '<table class="mt"><thead><tr><th>Name</th><th>Number</th></tr></thead><tbody>' + ourRows + '</tbody></table></div>'
    + '<div class="fg"><div class="fg-title">Customer Emergency WhatsApp</div>'
    + '<table class="mt"><thead><tr><th>Name</th><th>Contact</th></tr></thead><tbody>' + emerRows + '</tbody></table></div>'
    + '<div class="fg"><div class="fg-title">Platform Login Credentials</div>'
    + '<table class="mt"><thead><tr><th>Platform</th><th>Username</th><th>Password</th><th>OTP Goes To</th></tr></thead><tbody>' + platRows + '</tbody></table></div>'
    + '</div></div>';
}

function kvr(label, val) {
  return '<div class="kv"><span class="kl">' + label + '</span>'
    + (val ? '<span class="kv-v">' + esc(val) + '</span>' : '<span class="kv-e">-</span>')
    + '</div>';
}

function tog(hdr) {
  var body = hdr.nextElementSibling;
  var chev = hdr.querySelector('.card-chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function tpwd(uid, btn) {
  var el = document.getElementById(uid);
  if (btn.classList.contains('showing')) {
    el.innerHTML = '&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;';
    el.className = 'pwd-dots';
    btn.textContent = 'Show';
    btn.classList.remove('showing');
  } else {
    el.textContent = el.dataset.p || '(empty)';
    el.className = 'pwd-text';
    btn.textContent = 'Hide';
    btn.classList.add('showing');
  }
}

function setState(html) {
  var el = document.getElementById('state');
  el.innerHTML = html;
  el.style.display = html ? 'block' : 'none';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}
</script>
</body>
</html>
